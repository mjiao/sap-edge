---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: rosa-validation-pr{{ pull_request_number }}-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"   # only PRs
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/task: "[./.tekton/tasks/git-clone.yaml]"
    pipelinesascode.tekton.dev/max-keep-runs: "1"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
spec:
  pipelineRef:
    name: rosa-validation-pipeline
  timeouts:
    pipeline: "336h"      # Total pipeline timeout (14 days)
    tasks: "335h"         # Individual task timeout (tasks + finally must be <= pipeline)
    finally: "60m"        # Finally tasks timeout
  params:
    - name: repoUrl
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: clusterName
      value: "sap-elm-pr{{ pull_request_number }}"
    - name: awsRegion
      value: "eu-north-1"
    - name: rosaVersion
      value: "4.21.14"
    - name: awsSecretName
      value: "aws-mj"
    - name: redhatTokenSecretName
      value: "mj-rh-token"
    - name: hubKubeconfigSecretName
      value: "eic-kubeconfig"   # Ensure this secret exists with the hub's kubeconfig
    - name: terraformStateS3Bucket
      value: "eic-test-rosa-terraform-state"
    - name: terraformStateS3Key
      value: "rosa/terraform.tfstate"
    - name: terraformStateDynamoDBTable
      value: "eic-test-rosa-terraform-state-lock"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteMany]
          storageClassName: ocs-storagecluster-cephfs
          resources:
            requests:
              storage: 2Gi
