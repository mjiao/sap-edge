# Prerequisites:
# 1. Ensure the ObjectBucketClaim (OBC) 'sap-eic-restricted-cluster-config-resources'
#    is created and bound in the pipeline namespace, with restricted-resources zip files
#    uploaded to the S3 bucket under the 'restricted-resources/' prefix.
#
# 2. Ensure the Service Mesh 3.x operator is installed on the target cluster
#    (via OperatorHub or CLI before running this pipeline)

---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: hcp-ossm3-validation-pr{{ pull_request_number }}-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"   # only PRs
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/task: "[./.tekton/tasks/git-clone.yaml]"
    pipelinesascode.tekton.dev/max-keep-runs: "1"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
spec:
  pipelineRef:
    name: hcp-ossm3-validation-pipeline
  timeouts:
    pipeline: "336h"      # Total pipeline timeout (14 days)
    tasks: "335h"         # Individual task timeout (tasks + finally must be <= pipeline)
    finally: "60m"        # Finally tasks timeout
  params:
    # --- Git parameters ---
    - name: repoUrl
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: pullRequestNumber
      value: "{{ pull_request_number }}"

    # --- HCP cluster parameters ---
    - name: hostedClusterName
      value: "hcp-ossm-pr{{ pull_request_number }}"
    - name: hostedClusterNamespace
      value: "clusters"
    - name: releaseImage
      value: "quay.io/openshift-release-dev/ocp-release:4.21.7-x86_64"
    - name: nodePoolReplicas
      value: "3"
    - name: nodePoolCpuCores
      value: "16"
    - name: nodePoolMemoryGB
      value: "32"
    - name: rootDiskSizeGB
      value: "120"
    - name: pullSecretName
      value: "mj-pull-secret"
    - name: etcdStorageClass
      value: ""
    - name: hubKubeconfigSecretName
      value: "hub-admin-kubeconfig"

    # --- OSSM3 parameters ---
    - name: ossm3Channel
      value: "stable-3.2"
    - name: obcName
      value: "sap-eic-restricted-cluster-config-resources"
    - name: s3Prefix
      value: "restricted-resources/"

    # --- EIC services parameters ---
    - name: postgresVersion
      value: "v15"
    - name: postgresHA
      value: "false"
    - name: datastoreType
      value: "redis"
    - name: redisClusterType
      value: "standard"

    # --- Endpoint test parameters ---
    - name: eicAuthSecretName
      value: "eic-auth-secret"
    - name: publicDNS
      value: "false"

    # --- Jira parameters ---
    - name: jiraSecretName
      value: "jira-secret-mj"
    - name: jiraIssueKey
      value: ""

    # --- Pipeline control ---
    - name: skipTeardown
      value: "false"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteMany]
          storageClassName: ocs-storagecluster-cephfs
          resources:
            requests:
              storage: 2Gi
