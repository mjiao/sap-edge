---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: aro-eic-validation-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"   # only PRs
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
spec:
  pipelineRef:
    name: aro-eic-validation-pipeline
  timeouts:
    pipeline: "240h"      # Total pipeline timeout (10 days for long validation)
    tasks: "180m"         # Individual task timeout (3 hours)
    finally: "30m"        # Finally tasks timeout
  params:
    - name: repoUrl
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: aroLocation
      value: "northeurope"
    - name: aroClusterName
      value: "sap-eic-validation"
    - name: aroVersion
      value: "4.18.26"
    - name: azureSecretName
      value: "azure-sp-secret"
    - name: pullSecretName
      value: "mj-pull-secret"
    - name: eicAuthSecretName
      value: "eic-auth-secret"
    - name: postgresAdminPasswordSecretName
      value: "azure-postgres-admin-password"
    - name: deployPostgres
      value: "true"
    - name: deployRedis
      value: "true"
    - name: publicDNS
      value: "false"
    - name: eicVersion
      value: "8.36.8"
    - name: validationTests
      value: "full"
    - name: jiraSecretName
      value: "jira-secret-mj"
    - name: jiraIssueKey
      value: "SAPOCP-1708"
    - name: extraInfo
      value: "ARO EIC validation with version 8.36.8 on OpenShift 4.20"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteMany]
          storageClassName: ocs-storagecluster-cephfs
          resources:
            requests:
              storage: 500Mi