apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hcp-create-eic-route
spec:
  description: >-
    Creates an OpenShift passthrough Route for the SAP EIC Istio Ingress
    Gateway on the hosted cluster. The Route enables traffic to reach the
    Istio Gateway via the OpenShift Router (HAProxy) using SNI-based
    routing. Also creates a ConfigMap with the Route hostname for
    Route-based endpoint tests.
  params:
    - name: hostedClusterName
      type: string
      description: "Name of the hosted cluster"
    - name: hostedClusterNamespace
      type: string
      description: "Namespace for HostedCluster resources"
      default: "clusters"
    - name: hubKubeconfigSecretName
      type: string
      description: "Name of the Secret containing kubeconfig for hub cluster (optional, uses in-cluster config if empty)"
      default: ""
  workspaces:
    - name: source
  steps:
    - name: create-eic-route
      image: registry.access.redhat.com/ubi9/ubi
      timeout: "15m"
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        CLUSTER_NAME="$(params.hostedClusterName)"
        CLUSTER_NS="$(params.hostedClusterNamespace)"
        HUB_KUBECONFIG_SECRET="$(params.hubKubeconfigSecretName)"

        echo "=========================================="
        echo "HCP Create EIC Route Task"
        echo "=========================================="
        echo "Hosted Cluster: ${CLUSTER_NAME}"
        echo "Cluster Namespace: ${CLUSTER_NS}"
        echo "=========================================="

        # Install required tools
        echo "📦 Installing required packages..."
        dnf install -y jq > /dev/null 2>&1

        echo "📦 Installing OpenShift CLI..."
        curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o /tmp/oc.tar.gz
        tar xzf /tmp/oc.tar.gz -C /tmp
        mv /tmp/oc /usr/local/bin/
        cp /usr/local/bin/oc /usr/local/bin/kubectl
        rm -f /tmp/oc.tar.gz
        oc version --client

        # Configure hub cluster kubeconfig if provided
        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          echo "🔐 Extracting hub cluster kubeconfig from secret: ${HUB_KUBECONFIG_SECRET}..."
          HUB_KUBECONFIG="/tmp/hub-kubeconfig"
          if kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.kubeconfig}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: kubeconfig)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.config}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: config)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.value}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: value)"
          else
            echo "❌ Failed to extract kubeconfig from secret '${HUB_KUBECONFIG_SECRET}'"
            exit 1
          fi
          chmod 600 "${HUB_KUBECONFIG}"
          export KUBECONFIG="${HUB_KUBECONFIG}"
          echo "✅ Using hub kubeconfig for cluster operations"
          oc whoami
        else
          echo "ℹ️  No hub kubeconfig secret provided, using in-cluster service account"
        fi

        # Extract hosted cluster kubeconfig
        echo ""
        echo "🔐 Extracting kubeconfig for hosted cluster..."
        HOSTED_KUBECONFIG="/tmp/hosted-kubeconfig"
        kubectl get secret "${CLUSTER_NAME}-admin-kubeconfig" -n "${CLUSTER_NS}" \
          -o jsonpath='{.data.kubeconfig}' | base64 -d > "${HOSTED_KUBECONFIG}"
        chmod 600 "${HOSTED_KUBECONFIG}"
        export KUBECONFIG="${HOSTED_KUBECONFIG}"
        echo "✅ Successfully connected to hosted cluster"
        oc whoami

        # Determine gateway namespace
        echo ""
        echo "🔍 Determining gateway namespace..."
        GW_NS=""
        if oc get svc istio-ingressgateway -n istio-gateways &>/dev/null; then
          GW_NS="istio-gateways"
        elif oc get svc istio-ingressgateway -n istio-system &>/dev/null; then
          GW_NS="istio-system"
        else
          echo "🔍 Searching for istio-ingressgateway in all namespaces..."
          GW_NS=$(oc get svc --all-namespaces -o json | jq -r '.items[] | select(.metadata.name=="istio-ingressgateway") | .metadata.namespace' | head -1)
        fi

        if [[ -z "${GW_NS}" ]]; then
          echo "❌ Could not find istio-ingressgateway service in any namespace"
          exit 1
        fi
        echo "✅ Gateway namespace: ${GW_NS}"

        # Get ingress domain
        echo ""
        echo "📋 Getting ingress domain..."
        INGRESS_DOMAIN=""

        if oc get ingresscontroller default -n openshift-ingress-operator -o json &>/dev/null; then
          INGRESS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator \
            -o jsonpath='{.status.domain}' 2>/dev/null || echo "")
        fi

        if [[ -z "${INGRESS_DOMAIN}" ]]; then
          INGRESS_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}' 2>/dev/null || echo "")
          if [[ -n "${INGRESS_DOMAIN}" ]]; then
            INGRESS_DOMAIN="apps.${INGRESS_DOMAIN}"
          fi
        fi

        if [[ -z "${INGRESS_DOMAIN}" ]]; then
          echo "❌ Could not determine ingress domain"
          exit 1
        fi
        echo "✅ Ingress domain: ${INGRESS_DOMAIN}"

        # Build Route hostname
        ROUTE_HOST="eic.${INGRESS_DOMAIN}"
        echo "✅ Route hostname: ${ROUTE_HOST}"

        # Create passthrough Route
        echo ""
        echo "📦 Creating passthrough Route for EIC..."
        cat <<EOROUTE | oc apply -f -
        apiVersion: route.openshift.io/v1
        kind: Route
        metadata:
          name: eic-https-route
          namespace: ${GW_NS}
          labels:
            app: istio-ingressgateway
        spec:
          host: ${ROUTE_HOST}
          to:
            kind: Service
            name: istio-ingressgateway
            weight: 100
          port:
            targetPort: https
          tls:
            termination: passthrough
            insecureEdgeTerminationPolicy: None
          wildcardPolicy: None
        EOROUTE

        # Verify Route
        echo ""
        echo "🔍 Verifying Route..."
        oc get route eic-https-route -n "${GW_NS}"
        echo "✅ Route created successfully"

        # Switch back to hub kubeconfig to create ConfigMap
        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          export KUBECONFIG="/tmp/hub-kubeconfig"
        else
          unset KUBECONFIG
        fi

        # Create ConfigMap with Route info for Route-based endpoint tests
        echo ""
        echo "📦 Creating ConfigMap with Route info..."
        CONFIGMAP_NAME="route-info-hcp-${CLUSTER_NAME}"
        cat <<EOCM | oc apply -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${CONFIGMAP_NAME}
          labels:
            app.kubernetes.io/part-of: sap-edge-validation
            sap-edge/cluster-name: ${CLUSTER_NAME}
        data:
          host: "${ROUTE_HOST}"
          ingressIP: ""
        EOCM

        echo ""
        echo "=========================================="
        echo "✅ EIC Route Setup Complete"
        echo "=========================================="
        echo "  Route: ${ROUTE_HOST} → ${GW_NS}/istio-ingressgateway"
        echo "  ConfigMap: ${CONFIGMAP_NAME}"
        echo "  TLS: passthrough"
        echo "=========================================="
