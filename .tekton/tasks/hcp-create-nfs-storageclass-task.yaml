apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hcp-create-nfs-storageclass
spec:
  description: >-
    Deploy an NFS server provisioner on the hosted cluster to provide an
    RWX-capable StorageClass (nfs-rwx). Uses the kvaps/nfs-server-provisioner
    Helm chart backed by kubevirt-csi-infra-default.
  params:
    - name: hostedClusterName
      type: string
      description: "Name of the hosted cluster"
    - name: hostedClusterNamespace
      type: string
      description: "Namespace for HostedCluster resources"
      default: "clusters"
    - name: hubKubeconfigSecretName
      type: string
      description: "Name of the Secret containing kubeconfig for hub cluster (optional, uses in-cluster config if empty)"
      default: ""
    - name: nfsPersistenceSize
      type: string
      description: "PVC pool size for the NFS server provisioner"
      default: "20Gi"
  workspaces:
    - name: source
  steps:
    - name: create-nfs-storageclass
      image: registry.access.redhat.com/ubi9/ubi
      timeout: "336h"
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        CLUSTER_NAME="$(params.hostedClusterName)"
        CLUSTER_NS="$(params.hostedClusterNamespace)"
        HUB_KUBECONFIG_SECRET="$(params.hubKubeconfigSecretName)"
        NFS_PERSISTENCE_SIZE="$(params.nfsPersistenceSize)"

        echo "=========================================="
        echo "HCP Create NFS StorageClass"
        echo "=========================================="
        echo "Hosted Cluster: ${CLUSTER_NAME}"
        echo "Cluster Namespace: ${CLUSTER_NS}"
        echo "NFS Persistence Size: ${NFS_PERSISTENCE_SIZE}"
        echo "=========================================="

        # Install required tools
        echo "📦 Installing OpenShift CLI..."
        curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o /tmp/oc.tar.gz
        tar xzf /tmp/oc.tar.gz -C /tmp
        mv /tmp/oc /usr/local/bin/
        cp /usr/local/bin/oc /usr/local/bin/kubectl
        rm -f /tmp/oc.tar.gz
        oc version --client

        echo "📦 Installing Helm..."
        curl -fsSL https://get.helm.sh/helm-v3.17.1-linux-amd64.tar.gz -o /tmp/helm.tar.gz
        tar xzf /tmp/helm.tar.gz -C /tmp
        mv /tmp/linux-amd64/helm /usr/local/bin/
        chmod +x /usr/local/bin/helm
        rm -rf /tmp/helm.tar.gz /tmp/linux-amd64
        helm version

        # Configure hub cluster kubeconfig if provided
        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          echo "🔐 Extracting hub cluster kubeconfig from secret: ${HUB_KUBECONFIG_SECRET}..."
          HUB_KUBECONFIG="/tmp/hub-kubeconfig"
          if kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.kubeconfig}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: kubeconfig)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.config}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: config)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.value}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: value)"
          else
            echo "❌ Failed to extract kubeconfig from secret '${HUB_KUBECONFIG_SECRET}'"
            echo "   Secret should have kubeconfig data under key 'kubeconfig', 'config', or 'value'"
            exit 1
          fi
          chmod 600 "${HUB_KUBECONFIG}"
          export KUBECONFIG="${HUB_KUBECONFIG}"
          echo "✅ Using hub kubeconfig for cluster operations"
          oc whoami
        else
          echo "ℹ️  No hub kubeconfig secret provided, using in-cluster service account"
        fi

        # Extract kubeconfig for hosted cluster
        echo "🔐 Extracting kubeconfig for hosted cluster..."
        KUBECONFIG_SECRET="${CLUSTER_NAME}-admin-kubeconfig"

        if ! oc get secret "${KUBECONFIG_SECRET}" -n "${CLUSTER_NS}" > /dev/null 2>&1; then
          echo "❌ Kubeconfig secret '${KUBECONFIG_SECRET}' not found in namespace '${CLUSTER_NS}'"
          exit 1
        fi

        HOSTED_KUBECONFIG="/tmp/hosted-kubeconfig"
        oc get secret "${KUBECONFIG_SECRET}" -n "${CLUSTER_NS}" \
          -o jsonpath='{.data.kubeconfig}' | base64 -d > "${HOSTED_KUBECONFIG}"
        chmod 600 "${HOSTED_KUBECONFIG}"

        export KUBECONFIG="${HOSTED_KUBECONFIG}"

        echo "🔍 Verifying access to hosted cluster..."
        oc get nodes
        echo "✅ Successfully connected to hosted cluster"

        # Verify kubevirt-csi-infra-default StorageClass exists
        echo ""
        echo "🔍 Checking for kubevirt-csi-infra-default StorageClass..."
        if ! oc get sc kubevirt-csi-infra-default > /dev/null 2>&1; then
          echo "❌ StorageClass 'kubevirt-csi-infra-default' not found on hosted cluster"
          echo "   Available StorageClasses:"
          oc get sc
          exit 1
        fi
        echo "✅ kubevirt-csi-infra-default StorageClass is available"

        # Step 1: Prepare SCC
        echo ""
        echo "🔧 Step 1: Preparing namespace and security permissions..."
        oc create namespace nfs-system --dry-run=client -o yaml | oc apply -f -
        oc create sa nfs-server-sa -n nfs-system --dry-run=client -o yaml | oc apply -f -
        oc adm policy add-scc-to-user privileged -z nfs-server-sa -n nfs-system
        echo "✅ SCC permissions configured"

        # Step 2: Helm deploy NFS Server Provisioner
        echo ""
        echo "🔧 Step 2: Deploying NFS Server Provisioner via Helm..."
        helm repo add kvaps https://kvaps.github.io/charts
        helm repo update

        helm upgrade --install nfs-server kvaps/nfs-server-provisioner \
          --namespace nfs-system \
          --set rbac.create=true \
          --set serviceAccount.create=false \
          --set serviceAccount.name=nfs-server-sa \
          --set persistence.enabled=true \
          --set persistence.storageClass=kubevirt-csi-infra-default \
          --set persistence.size="${NFS_PERSISTENCE_SIZE}" \
          --set storageClass.name=nfs-rwx \
          --set storageClass.defaultClass=false \
          --wait --timeout 5m

        echo "✅ Helm release deployed"

        # Step 3: Verify
        echo ""
        echo "🔍 Step 3: Verifying NFS setup..."

        echo "   Waiting for NFS PVC to become Bound..."
        for i in $(seq 1 30); do
          PVC_STATUS=$(oc get pvc -n nfs-system -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "Pending")
          if [[ "${PVC_STATUS}" == "Bound" ]]; then
            echo "   ✅ PVC is Bound"
            break
          fi
          if [[ ${i} -eq 30 ]]; then
            echo "   ❌ PVC did not become Bound within 300 seconds"
            oc get pvc -n nfs-system
            exit 1
          fi
          echo "   PVC status: ${PVC_STATUS}, waiting... (${i}/30)"
          sleep 10
        done

        echo ""
        echo "   Verifying nfs-rwx StorageClass..."
        if ! oc get sc nfs-rwx > /dev/null 2>&1; then
          echo "   ❌ StorageClass 'nfs-rwx' not found"
          exit 1
        fi
        echo "   ✅ StorageClass 'nfs-rwx' is available"

        echo ""
        echo "📋 PVC status:"
        oc get pvc -n nfs-system

        echo ""
        echo "📋 Pods in nfs-system:"
        oc get pods -n nfs-system

        echo ""
        echo "📋 StorageClasses:"
        oc get sc

        echo ""
        echo "=========================================="
        echo "✅ NFS StorageClass setup completed"
        echo "   StorageClass: nfs-rwx"
        echo "   Backing StorageClass: kubevirt-csi-infra-default"
        echo "   NFS Pool Size: ${NFS_PERSISTENCE_SIZE}"
        echo "=========================================="
