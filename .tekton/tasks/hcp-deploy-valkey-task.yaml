apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hcp-deploy-valkey
spec:
  description: Deploy Valkey (standalone or cluster) on the hosted cluster
  params:
    - name: hostedClusterName
      type: string
      description: "Name of the hosted cluster"
    - name: hostedClusterNamespace
      type: string
      description: "Namespace for HostedCluster resources"
      default: "clusters"
    - name: datastoreType
      type: string
      description: "Valkey deployment type: valkey-standalone or valkey-cluster"
    - name: valkeyNamespace
      type: string
      description: "Namespace for Valkey deployment on hosted cluster (auto-determined if empty)"
      default: ""
    - name: hubKubeconfigSecretName
      type: string
      description: "Name of the Secret containing kubeconfig for hub cluster (optional, uses in-cluster config if empty)"
      default: ""
  workspaces:
    - name: source
  results:
    - name: valkey-host
      description: "Valkey service host(s)"
    - name: valkey-port
      description: "Valkey service port"
    - name: valkey-mode
      description: "Valkey mode (standalone or cluster)"
  steps:
    - name: deploy-valkey
      image: registry.access.redhat.com/ubi9/ubi
      timeout: "336h"
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Parameters
        CLUSTER_NAME="$(params.hostedClusterName)"
        CLUSTER_NS="$(params.hostedClusterNamespace)"
        DATASTORE_TYPE="$(params.datastoreType)"
        VALKEY_NAMESPACE="$(params.valkeyNamespace)"
        HUB_KUBECONFIG_SECRET="$(params.hubKubeconfigSecretName)"

        # Determine mode and defaults based on datastoreType
        if [[ "${DATASTORE_TYPE}" == "valkey-standalone" ]]; then
          MODE="standalone"
          VALKEY_NAMESPACE="${VALKEY_NAMESPACE:-sap-eic-external-valkey}"
          DEPLOY_DIR="edge-integration-cell/external-valkey"
        elif [[ "${DATASTORE_TYPE}" == "valkey-cluster" ]]; then
          MODE="cluster"
          VALKEY_NAMESPACE="${VALKEY_NAMESPACE:-sap-eic-external-valkey-cluster}"
          DEPLOY_DIR="edge-integration-cell/external-valkey-cluster"
        else
          echo "❌ Invalid datastoreType: ${DATASTORE_TYPE}"
          echo "   Must be 'valkey-standalone' or 'valkey-cluster'"
          exit 1
        fi

        echo "=========================================="
        echo "HCP Deploy Valkey Task"
        echo "=========================================="
        echo "Hosted Cluster: ${CLUSTER_NAME}"
        echo "Cluster Namespace: ${CLUSTER_NS}"
        echo "Valkey Namespace: ${VALKEY_NAMESPACE}"
        echo "Valkey Mode: ${MODE}"
        echo "=========================================="

        # Install required tools
        echo "📦 Installing required packages..."
        dnf install -y jq > /dev/null 2>&1

        echo "📦 Installing OpenShift CLI..."
        curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o /tmp/oc.tar.gz
        tar xzf /tmp/oc.tar.gz -C /tmp
        mv /tmp/oc /usr/local/bin/
        cp /usr/local/bin/oc /usr/local/bin/kubectl
        rm -f /tmp/oc.tar.gz
        oc version --client

        echo "📦 Installing Helm..."
        curl -fsSL https://get.helm.sh/helm-v3.17.1-linux-amd64.tar.gz -o /tmp/helm.tar.gz
        tar xzf /tmp/helm.tar.gz -C /tmp
        mv /tmp/linux-amd64/helm /usr/local/bin/
        chmod +x /usr/local/bin/helm
        rm -rf /tmp/helm.tar.gz /tmp/linux-amd64
        helm version --client

        # Configure hub cluster kubeconfig if provided
        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          echo "🔐 Extracting hub cluster kubeconfig from secret: ${HUB_KUBECONFIG_SECRET}..."
          HUB_KUBECONFIG="/tmp/hub-kubeconfig"
          # Try different common key names for kubeconfig in secrets
          if kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.kubeconfig}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: kubeconfig)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.config}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: config)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.value}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: value)"
          else
            echo "❌ Failed to extract kubeconfig from secret '${HUB_KUBECONFIG_SECRET}'"
            echo "   Secret should have kubeconfig data under key 'kubeconfig', 'config', or 'value'"
            exit 1
          fi
          chmod 600 "${HUB_KUBECONFIG}"
          export KUBECONFIG="${HUB_KUBECONFIG}"
          echo "✅ Using hub kubeconfig for cluster operations"
          oc whoami
        else
          echo "ℹ️  No hub kubeconfig secret provided, using in-cluster service account"
        fi

        # Extract kubeconfig for hosted cluster
        echo "🔐 Extracting kubeconfig for hosted cluster..."
        KUBECONFIG_SECRET="${CLUSTER_NAME}-admin-kubeconfig"

        if ! oc get secret "${KUBECONFIG_SECRET}" -n "${CLUSTER_NS}" > /dev/null 2>&1; then
          echo "❌ Kubeconfig secret '${KUBECONFIG_SECRET}' not found in namespace '${CLUSTER_NS}'"
          exit 1
        fi

        HOSTED_KUBECONFIG="/tmp/hosted-kubeconfig"
        oc get secret "${KUBECONFIG_SECRET}" -n "${CLUSTER_NS}" \
          -o jsonpath='{.data.kubeconfig}' | base64 -d > "${HOSTED_KUBECONFIG}"
        chmod 600 "${HOSTED_KUBECONFIG}"

        # Set KUBECONFIG to hosted cluster
        export KUBECONFIG="${HOSTED_KUBECONFIG}"

        echo "🔍 Verifying access to hosted cluster..."
        oc get nodes
        echo "✅ Successfully connected to hosted cluster"

        # Verify the deploy_valkey.sh script exists
        DEPLOY_SCRIPT="$(workspaces.source.path)/${DEPLOY_DIR}/deploy_valkey.sh"
        if [[ ! -f "${DEPLOY_SCRIPT}" ]]; then
          echo "❌ Deploy script not found: ${DEPLOY_SCRIPT}"
          exit 1
        fi
        chmod +x "${DEPLOY_SCRIPT}"

        # Run the Valkey deployment script
        echo ""
        echo "📗 Deploying Valkey (${MODE}) on hosted cluster..."
        echo "----------------------------------------"

        cd "$(workspaces.source.path)/${DEPLOY_DIR}"

        DEPLOY_ARGS=("-n" "${VALKEY_NAMESPACE}" "-f")

        bash deploy_valkey.sh "${DEPLOY_ARGS[@]}"

        echo "----------------------------------------"
        echo ""

        # Get Valkey access details
        echo "📋 Getting Valkey access details..."

        # Wait a moment for services to be created
        sleep 5

        VALKEY_PORT="6380"

        if [[ "${MODE}" == "standalone" ]]; then
          VALKEY_HOST="valkey.${VALKEY_NAMESPACE}.svc.cluster.local"
        else
          # Cluster mode: build comma-separated list of all node addresses
          REPLICA_COUNT=$(oc get pods -l name=valkey -n "${VALKEY_NAMESPACE}" --no-headers 2>/dev/null | wc -l | tr -d ' ')
          if [[ "${REPLICA_COUNT}" -eq 0 ]]; then
            # Fallback to default 3 replicas
            REPLICA_COUNT=3
          fi
          VALKEY_NODES=""
          for i in $(seq 0 $((REPLICA_COUNT - 1))); do
            if [[ -n "${VALKEY_NODES}" ]]; then
              VALKEY_NODES="${VALKEY_NODES},"
            fi
            VALKEY_NODES="${VALKEY_NODES}valkey-${i}.valkey-headless.${VALKEY_NAMESPACE}.svc.cluster.local"
          done
          VALKEY_HOST="${VALKEY_NODES}"
        fi

        # Write results
        echo "${VALKEY_HOST}" > $(results.valkey-host.path)
        echo "${VALKEY_PORT}" > $(results.valkey-port.path)
        echo "${MODE}" > $(results.valkey-mode.path)

        # Display connection info
        echo ""
        echo "=========================================="
        echo "✅ Valkey (${MODE}) deployed successfully!"
        echo "=========================================="
        echo "Host: ${VALKEY_HOST}"
        echo "Port: ${VALKEY_PORT}"
        echo "Mode: ${MODE}"
        echo "Namespace: ${VALKEY_NAMESPACE}"
        echo ""
        echo "📋 Valkey pods:"
        oc get pods -n "${VALKEY_NAMESPACE}" -o wide
        echo ""
        echo "📋 Valkey services:"
        oc get svc -n "${VALKEY_NAMESPACE}"
        echo ""
        echo "📋 Valkey secrets:"
        oc get secrets -n "${VALKEY_NAMESPACE}" | grep -E "valkey|tls" || echo "No valkey secrets found"
        echo ""
        echo "📋 Valkey ConfigMaps:"
        oc get configmaps -n "${VALKEY_NAMESPACE}" | grep -E "valkey|service-ca" || echo "No valkey configmaps found"
        echo "=========================================="
