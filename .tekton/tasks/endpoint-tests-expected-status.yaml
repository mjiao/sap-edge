apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: endpoint-tests-expected-status
spec:
  description: >-
    Tests a single EIC endpoint and validates against an expected HTTP status
    code. Use this instead of endpoint-tests when the expected response is not
    200 (e.g., 403 for IP-filtered endpoints accessed via OpenShift Routes
    where source IP is not preserved).
  params:
    - name: clusterConfigMapName
      type: string
    - name: eicAuthSecretName
      type: string
    - name: publicDNS
      type: string
      default: "false"
    - name: endpointPath
      type: string
      description: The single endpoint path to test (e.g. /http/test1)
    - name: expectedStatus
      type: string
      description: The expected HTTP status code (e.g. "403")
    - name: hubKubeconfigSecretName
      type: string
      description: "Name of the Secret containing kubeconfig for hub cluster (optional, enables remote exec via oc run)"
      default: ""
  workspaces:
    - name: source
  steps:
    - name: run-single-test
      image: registry.access.redhat.com/ubi9/ubi
      workingDir: $(workspaces.source.path)
      env:
        - name: HOST
          valueFrom: { configMapKeyRef: { name: $(params.clusterConfigMapName), key: host } }
        - name: INGRESS_IP
          valueFrom: { configMapKeyRef: { name: $(params.clusterConfigMapName), key: ingressIP } }
        - name: AUTH_KEY
          valueFrom: { secretKeyRef: { name: $(params.eicAuthSecretName), key: authKey } }
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        EXPECTED_STATUS="$(params.expectedStatus)"
        ENDPOINT_PATH="$(params.endpointPath)"
        HUB_KUBECONFIG_SECRET="$(params.hubKubeconfigSecretName)"

        CURL_OPTS=("-k" "-s" "-o" "/dev/null" "-w" "%{http_code}")

        if [[ "$(params.publicDNS)" == "true" ]]; then
          echo "Resolution: Public DNS"
        else
          if [[ "$INGRESS_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CURL_OPTS+=("--resolve" "${HOST}:443:${INGRESS_IP}")
          else
            CURL_OPTS+=("--connect-to" "${HOST}:443:${INGRESS_IP}:443")
          fi
        fi

        echo "======== Testing https://${HOST}${ENDPOINT_PATH} ========"
        echo "Expected HTTP status: ${EXPECTED_STATUS}"

        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          echo "🔐 Remote exec mode: will run curl via oc run on remote cluster"

          echo "📦 Installing OpenShift CLI..."
          curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o /tmp/oc.tar.gz
          tar xzf /tmp/oc.tar.gz -C /tmp
          mv /tmp/oc /usr/local/bin/
          cp /usr/local/bin/oc /usr/local/bin/kubectl
          rm -f /tmp/oc.tar.gz

          echo "🔐 Extracting hub cluster kubeconfig from secret: ${HUB_KUBECONFIG_SECRET}..."
          HUB_KUBECONFIG="/tmp/hub-kubeconfig"
          if kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.kubeconfig}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: kubeconfig)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.config}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: config)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.value}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: value)"
          else
            echo "❌ Failed to extract kubeconfig from secret '${HUB_KUBECONFIG_SECRET}'"
            exit 1
          fi
          chmod 600 "${HUB_KUBECONFIG}"
          export KUBECONFIG="${HUB_KUBECONFIG}"

          RESOLVE_OPT=""
          if [[ "$(params.publicDNS)" != "true" ]]; then
            if [[ "$INGRESS_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              RESOLVE_OPT="--resolve ${HOST}:443:${INGRESS_IP}"
            else
              RESOLVE_OPT="--connect-to ${HOST}:443:${INGRESS_IP}:443"
            fi
          fi

          POD_NAME="curl-test-$(date +%s)-${RANDOM}"
          OC_OUTPUT=$(oc run "${POD_NAME}" -n default --rm -i --restart=Never \
            --image=curlimages/curl \
            -- curl -k -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Basic ${AUTH_KEY}" \
            ${RESOLVE_OPT} \
            "https://${HOST}${ENDPOINT_PATH}" 2>&1) || true

          # oc run may include pod status lines; extract only lines that are
          # exactly a 3-digit HTTP status code
          ACTUAL_STATUS=$(echo "${OC_OUTPUT}" | grep -xE '[0-9]{3}' | tail -1)
          if [[ -z "${ACTUAL_STATUS}" ]]; then
            echo "❌ Failed to get HTTP status from remote pod"
            echo "${OC_OUTPUT}"
            exit 1
          fi
        else
          ACTUAL_STATUS=$(curl "${CURL_OPTS[@]}" \
            -H "Authorization: Basic ${AUTH_KEY}" \
            --url "https://${HOST}${ENDPOINT_PATH}")
        fi

        echo "Actual HTTP status: ${ACTUAL_STATUS}"

        if [[ "${ACTUAL_STATUS}" == "${EXPECTED_STATUS}" ]]; then
          echo "✅ Endpoint returned expected status ${EXPECTED_STATUS}: ${ENDPOINT_PATH}"
          exit 0
        else
          echo "❌ Endpoint returned ${ACTUAL_STATUS}, expected ${EXPECTED_STATUS}: ${ENDPOINT_PATH}"
          exit 1
        fi
