apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hcp-verify-monitoring
spec:
  description: >-
    Creates NetworkPolicies to allow Prometheus scraping, then verifies
    that SAP EIC ServiceMonitors are deployed and all Prometheus targets
    are in Up state on the hosted cluster. Runs after EIC deployment
    to confirm monitoring is working end-to-end.
  params:
    - name: hostedClusterName
      type: string
      description: "Name of the hosted cluster"
    - name: hostedClusterNamespace
      type: string
      description: "Namespace for HostedCluster resources"
      default: "clusters"
    - name: hubKubeconfigSecretName
      type: string
      description: "Name of the Secret containing kubeconfig for hub cluster (optional, uses in-cluster config if empty)"
      default: ""
  workspaces:
    - name: source
  steps:
    - name: verify-monitoring
      image: registry.access.redhat.com/ubi9/ubi
      timeout: "15m"
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        CLUSTER_NAME="$(params.hostedClusterName)"
        CLUSTER_NS="$(params.hostedClusterNamespace)"
        HUB_KUBECONFIG_SECRET="$(params.hubKubeconfigSecretName)"

        echo "=========================================="
        echo "HCP Verify Monitoring Task"
        echo "=========================================="
        echo "Hosted Cluster: ${CLUSTER_NAME}"
        echo "=========================================="

        # Install required tools
        echo "📦 Installing required packages..."
        dnf install -y jq > /dev/null 2>&1

        echo "📦 Installing OpenShift CLI..."
        curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o /tmp/oc.tar.gz
        tar xzf /tmp/oc.tar.gz -C /tmp
        mv /tmp/oc /usr/local/bin/
        cp /usr/local/bin/oc /usr/local/bin/kubectl
        rm -f /tmp/oc.tar.gz
        oc version --client

        # Configure hub cluster kubeconfig if provided
        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          echo "🔐 Extracting hub cluster kubeconfig from secret: ${HUB_KUBECONFIG_SECRET}..."
          HUB_KUBECONFIG="/tmp/hub-kubeconfig"
          if kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.kubeconfig}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: kubeconfig)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.config}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: config)"
          elif kubectl get secret "${HUB_KUBECONFIG_SECRET}" -o jsonpath='{.data.value}' 2>/dev/null | base64 -d > "${HUB_KUBECONFIG}" 2>/dev/null && [[ -s "${HUB_KUBECONFIG}" ]]; then
            echo "✅ Kubeconfig extracted (key: value)"
          else
            echo "❌ Failed to extract kubeconfig from secret '${HUB_KUBECONFIG_SECRET}'"
            exit 1
          fi
          chmod 600 "${HUB_KUBECONFIG}"
          export KUBECONFIG="${HUB_KUBECONFIG}"
          echo "✅ Using hub kubeconfig for cluster operations"
          oc whoami
        else
          echo "ℹ️  No hub kubeconfig secret provided, using in-cluster service account"
        fi

        # Extract hosted cluster kubeconfig
        echo ""
        echo "🔐 Extracting kubeconfig for hosted cluster..."
        HOSTED_KUBECONFIG="/tmp/hosted-kubeconfig"
        kubectl get secret "${CLUSTER_NAME}-admin-kubeconfig" -n "${CLUSTER_NS}" \
          -o jsonpath='{.data.kubeconfig}' | base64 -d > "${HOSTED_KUBECONFIG}"
        chmod 600 "${HOSTED_KUBECONFIG}"
        export KUBECONFIG="${HOSTED_KUBECONFIG}"
        [[ -f "$(workspaces.source.path)/.kubeconfig-rewrite.sh" ]] && source "$(workspaces.source.path)/.kubeconfig-rewrite.sh" "${HOSTED_KUBECONFIG}"
        echo "✅ Successfully connected to hosted cluster"
        oc whoami

        # Step 1: Create NetworkPolicies for Prometheus scraping
        # Created here (after SAP ELM deployment) rather than in enable-monitoring
        # to avoid breaking intra-namespace traffic before SAP deploys its own policies.
        echo ""
        echo "🔒 Step 1: Creating NetworkPolicies for Prometheus scraping..."

        NAMESPACES=("edge-icell" "edge-icell-services" "edgelm")

        for NS in "${NAMESPACES[@]}"; do
          if oc get namespace "${NS}" &>/dev/null; then
            echo "📦 Creating NetworkPolicy in ${NS}..."
            cat <<EONP | oc apply -f -
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-from-openshift-user-workload-monitoring
          namespace: ${NS}
        spec:
          podSelector: {}
          ingress:
          - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: openshift-user-workload-monitoring
        EONP
            echo "✅ NetworkPolicy created in ${NS}"
          else
            echo "ℹ️  Namespace ${NS} does not exist, skipping NetworkPolicy"
          fi
        done

        # Step 2: Check ServiceMonitors
        echo ""
        echo "📊 Step 2: Checking ServiceMonitors..."
        TOTAL_SM=0

        for NS in "${NAMESPACES[@]}"; do
          if oc get namespace "${NS}" &>/dev/null; then
            SM_LIST=$(oc get servicemonitor -n "${NS}" -o json 2>/dev/null | jq -r '.items[].metadata.name' 2>/dev/null || echo "")
            SM_COUNT=$(echo "${SM_LIST}" | grep -c . || echo "0")
            TOTAL_SM=$((TOTAL_SM + SM_COUNT))
            if [[ "${SM_COUNT}" -gt 0 ]]; then
              echo "✅ ${NS}: ${SM_COUNT} ServiceMonitor(s)"
              echo "${SM_LIST}" | sed 's/^/     - /'
            else
              echo "⚠️  ${NS}: No ServiceMonitors found"
            fi
          else
            echo "ℹ️  Namespace ${NS} does not exist"
          fi
        done

        echo ""
        echo "📊 Total ServiceMonitors: ${TOTAL_SM}"

        if [[ "${TOTAL_SM}" -eq 0 ]]; then
          echo "❌ No ServiceMonitors found in any namespace"
          exit 1
        fi

        # Also check for PodMonitors
        echo ""
        echo "📊 Checking PodMonitors..."
        for NS in "${NAMESPACES[@]}"; do
          if oc get namespace "${NS}" &>/dev/null; then
            PM_LIST=$(oc get podmonitor -n "${NS}" -o json 2>/dev/null | jq -r '.items[].metadata.name' 2>/dev/null || echo "")
            PM_COUNT=$(echo "${PM_LIST}" | grep -c . || echo "0")
            if [[ "${PM_COUNT}" -gt 0 ]]; then
              echo "✅ ${NS}: ${PM_COUNT} PodMonitor(s)"
              echo "${PM_LIST}" | sed 's/^/     - /'
            fi
          fi
        done

        # Step 3: Query Prometheus targets
        echo ""
        echo "📊 Step 3: Checking Prometheus targets..."

        # Get the Prometheus route or use port-forward
        PROM_HOST=""
        PROM_TOKEN=""

        # Try to get thanos-querier route (cluster-level)
        THANOS_HOST=$(oc get route thanos-querier -n openshift-monitoring -o jsonpath='{.spec.host}' 2>/dev/null || echo "")

        if [[ -n "${THANOS_HOST}" ]]; then
          PROM_HOST="https://${THANOS_HOST}"
          PROM_TOKEN=$(oc whoami -t 2>/dev/null || echo "")
        fi

        if [[ -z "${PROM_HOST}" ]] || [[ -z "${PROM_TOKEN}" ]]; then
          echo "⚠️  Cannot access Prometheus API directly (no route or token)"
          echo "   Falling back to ServiceMonitor existence check only"
          echo ""
          echo "=========================================="
          echo "✅ Monitoring Verification Complete (partial)"
          echo "=========================================="
          echo "  ServiceMonitors: ${TOTAL_SM} found"
          echo "  Prometheus targets: Could not verify (no API access)"
          echo "=========================================="
          exit 0
        fi

        # Query targets with retry
        echo "🔍 Querying Prometheus targets..."
        TARGETS_UP=0
        TARGETS_DOWN=0
        MAX_RETRIES=6
        RETRY_INTERVAL=30

        for ATTEMPT in $(seq 1 ${MAX_RETRIES}); do
          echo ""
          echo "   Attempt ${ATTEMPT}/${MAX_RETRIES}..."

          TARGETS_JSON=$(curl -sk -H "Authorization: Bearer ${PROM_TOKEN}" \
            "${PROM_HOST}/api/v1/targets" 2>/dev/null || echo "")

          if [[ -z "${TARGETS_JSON}" ]]; then
            echo "   ⚠️ Could not reach Prometheus API"
            if [[ "${ATTEMPT}" -lt "${MAX_RETRIES}" ]]; then
              echo "   Retrying in ${RETRY_INTERVAL}s..."
              sleep "${RETRY_INTERVAL}"
              continue
            fi
            break
          fi

          # Filter targets for our namespaces
          TARGETS_UP=0
          TARGETS_DOWN=0
          TARGETS_DETAILS=""

          for NS in "${NAMESPACES[@]}"; do
            NS_UP=$(echo "${TARGETS_JSON}" | jq -r "[.data.activeTargets[] | select(.labels.namespace == \"${NS}\") | select(.health == \"up\")] | length" 2>/dev/null || echo "0")
            NS_DOWN=$(echo "${TARGETS_JSON}" | jq -r "[.data.activeTargets[] | select(.labels.namespace == \"${NS}\") | select(.health != \"up\")] | length" 2>/dev/null || echo "0")
            TARGETS_UP=$((TARGETS_UP + NS_UP))
            TARGETS_DOWN=$((TARGETS_DOWN + NS_DOWN))

            if [[ $((NS_UP + NS_DOWN)) -gt 0 ]]; then
              echo "   ${NS}: ${NS_UP} up, ${NS_DOWN} down"

              # List individual targets
              echo "${TARGETS_JSON}" | jq -r ".data.activeTargets[] | select(.labels.namespace == \"${NS}\") | \"     [\(.health)] \(.labels.job // .labels.service // \"unknown\") (\(.scrapeUrl // \"n/a\"))\"" 2>/dev/null || true
            fi
          done

          if [[ "${TARGETS_DOWN}" -eq 0 ]] && [[ "${TARGETS_UP}" -gt 0 ]]; then
            echo ""
            echo "✅ All ${TARGETS_UP} Prometheus targets are Up"
            break
          fi

          if [[ "${ATTEMPT}" -lt "${MAX_RETRIES}" ]]; then
            echo "   ${TARGETS_DOWN} target(s) still down, retrying in ${RETRY_INTERVAL}s..."
            sleep "${RETRY_INTERVAL}"
          fi
        done

        echo ""
        echo "=========================================="
        echo "📊 Monitoring Verification Results"
        echo "=========================================="
        echo "  ServiceMonitors: ${TOTAL_SM}"
        echo "  Prometheus targets Up: ${TARGETS_UP}"
        echo "  Prometheus targets Down: ${TARGETS_DOWN}"
        echo "=========================================="

        if [[ "${TARGETS_DOWN}" -gt 0 ]]; then
          echo "⚠️  WARNING: ${TARGETS_DOWN} target(s) are not Up"
          echo "   This may indicate a networking or configuration issue"
          echo "   Check NetworkPolicies and pod readiness"
        fi

        echo "✅ Monitoring verification complete"
