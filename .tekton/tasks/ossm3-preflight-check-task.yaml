---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ossm3-preflight-check
spec:
  description: >-
    Pre-flight validation for the HCP OSSM3 pipeline. Checks that
    required Secrets, ConfigMaps (OBC), and other prerequisites exist before
    starting expensive cluster provisioning operations.
  params:
    - name: obcName
      type: string
      description: "Name of the ObjectBucketClaim (OBC) for downloading restricted-access RBAC resources from S3"
      default: "sap-eic-restricted-cluster-config-resources"
    - name: pullSecretName
      type: string
      description: "Name of the pull secret"
      default: "redhat-pull-secret"
    - name: hubKubeconfigSecretName
      type: string
      description: "Name of the Secret containing kubeconfig for hub cluster (optional)"
      default: ""
  steps:
    - name: preflight-check
      image: registry.access.redhat.com/ubi9/ubi
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        OBC_NAME="$(params.obcName)"
        PULL_SECRET="$(params.pullSecretName)"
        HUB_KUBECONFIG_SECRET="$(params.hubKubeconfigSecretName)"

        echo "=========================================="
        echo "OSSM3 Pre-flight Validation"
        echo "=========================================="
        ERRORS=0

        # Install kubectl
        curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz -o /tmp/oc.tar.gz
        tar xzf /tmp/oc.tar.gz -C /tmp
        mv /tmp/oc /usr/local/bin/
        cp /usr/local/bin/oc /usr/local/bin/kubectl
        rm -f /tmp/oc.tar.gz

        # Check OBC Secret (S3 credentials)
        echo ""
        echo "🔍 Checking OBC Secret: ${OBC_NAME}..."
        if kubectl get secret "${OBC_NAME}" > /dev/null 2>&1; then
          echo "   ✅ OBC Secret '${OBC_NAME}' exists (S3 credentials)"
        else
          echo "   ❌ OBC Secret '${OBC_NAME}' not found"
          echo "      Ensure the ObjectBucketClaim '${OBC_NAME}' is created and bound"
          ERRORS=$((ERRORS + 1))
        fi

        # Check OBC ConfigMap (S3 endpoint info)
        echo ""
        echo "🔍 Checking OBC ConfigMap: ${OBC_NAME}..."
        if kubectl get configmap "${OBC_NAME}" > /dev/null 2>&1; then
          echo "   ✅ OBC ConfigMap '${OBC_NAME}' exists (S3 endpoint info)"
        else
          echo "   ❌ OBC ConfigMap '${OBC_NAME}' not found"
          echo "      Ensure the ObjectBucketClaim '${OBC_NAME}' is created and bound"
          ERRORS=$((ERRORS + 1))
        fi

        # Check pull secret
        echo ""
        echo "🔍 Checking pull secret: ${PULL_SECRET}..."
        if kubectl get secret "${PULL_SECRET}" > /dev/null 2>&1; then
          echo "   ✅ Secret '${PULL_SECRET}' exists"
        else
          echo "   ❌ Secret '${PULL_SECRET}' not found"
          ERRORS=$((ERRORS + 1))
        fi

        # Check hub kubeconfig secret (if provided)
        if [[ -n "${HUB_KUBECONFIG_SECRET}" ]]; then
          echo ""
          echo "🔍 Checking hub kubeconfig secret: ${HUB_KUBECONFIG_SECRET}..."
          if kubectl get secret "${HUB_KUBECONFIG_SECRET}" > /dev/null 2>&1; then
            echo "   ✅ Secret '${HUB_KUBECONFIG_SECRET}' exists"
          else
            echo "   ❌ Secret '${HUB_KUBECONFIG_SECRET}' not found"
            ERRORS=$((ERRORS + 1))
          fi
        fi

        # Summary
        echo ""
        echo "=========================================="
        if [[ ${ERRORS} -gt 0 ]]; then
          echo "❌ Pre-flight check FAILED: ${ERRORS} issue(s) found"
          echo "   Please fix the issues above before running the pipeline."
          exit 1
        else
          echo "✅ All pre-flight checks passed"
        fi
        echo "=========================================="
