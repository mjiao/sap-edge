apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: aro-eic-full-test-pipeline
  annotations:
    description: "Complete SAP Edge Integration Cell validation pipeline: deploys ARO with Azure services (PostgreSQL, Redis, Quay Storage via Bicep), Quay registry operator, runs comprehensive endpoint tests, and tears down infrastructure"
spec:
  params:
    - name: repoUrl
      type: string
    - name: revision
      type: string
    - name: pullRequestNumber
      type: string
      description: "Pull request number"
      default: ""
    - name: aroLocation
      type: string
      description: "ARO location"
      default: "northeurope"
    - name: aroClusterName
      type: string
      description: "ARO cluster name"
    - name: aroVersion
      type: string
      description: "ARO version"
      default: "4.15.35"
    - name: azureSecretName
      type: string
      description: "Name of the Kubernetes Secret containing Azure service principal credentials, ARO resource group, and ARO domain"
      default: "azure-sp-secret"
    - name: pullSecretName
      type: string
      description: "Name of the Kubernetes Secret containing Red Hat pull secret"
      default: "redhat-pull-secret"
    - name: eicAuthSecretName
      type: string
      description: "EIC authentication secret name"
    - name: postgresAdminPasswordSecretName
      type: string
      description: "Name of the Kubernetes Secret containing PostgreSQL admin password"
      default: "azure-postgres-admin-password"
    - name: quayAdminPasswordSecretName
      type: string
      description: "Name of the Kubernetes Secret containing Quay admin password and email"
      default: "quay-admin-secret"
    - name: deployPostgres
      type: string
      description: "Whether to deploy PostgreSQL (true/false)"
      default: "false"
    - name: deployRedis
      type: string
      description: "Whether to deploy Redis (true/false)"
      default: "false"
    - name: deployQuay
      type: string
      description: "Whether to deploy Quay storage (true/false)"
      default: "true"
    - name: publicDNS
      type: string
      description: "Use public DNS"
      default: "false"
    - name: jiraSecretName
      type: string
      description: "Name of the Kubernetes Secret containing Jira credentials"
    - name: jiraIssueKey
      type: string
      description: "Jira issue key to update with test results"
    - name: skipEicValidation
      type: string
      description: "Skip EIC validation and endpoint tests (true/false). When true, skips directly to teardown approval."
      default: "false"
    - name: skipAutomatedTests
      type: string
      description: "Skip automated endpoint tests for manual execution: httpbinipfilter, slvredis, ratelimit-slvredis (true/false)"
      default: "false"
    - name: hubClusterName
      type: string
      description: "Name of the hub cluster (used to derive kubeconfig secret name: {hubClusterName}-kubeconfig)"
    # --- OSSM3 parameters ---
    - name: ossm3Channel
      type: string
      description: "OLM subscription channel for the OSSM3 operator"
      default: "stable-3.2"
    - name: obcName
      type: string
      description: "Name of the ObjectBucketClaim (OBC) for downloading restricted-access RBAC resources from S3"
      default: "sap-eic-restricted-cluster-config-resources"
    - name: s3Prefix
      type: string
      description: "S3 key prefix for the restricted-resources zip files"
      default: "restricted-resources/"
  results:
    - name: cluster-summary
      description: "Brief cluster and services validation summary"
      value: $(tasks.validate-and-get-access.results.cluster-summary)
  workspaces:
    - name: source
  tasks:
    - name: fetch-repository
      taskRef: { name: git-clone }
      params:
        - name: url
          value: $(params.repoUrl)
        - name: revision
          value: $(params.revision)
        - name: depth
          value: "0"  # Full clone to ensure all refs are available
      workspaces:
        - name: output
          workspace: source

    - name: deploy-aro
      runAfter: [fetch-repository]
      taskRef: { name: aro-deploy-with-eic-services }
      params:
        - name: aroLocation
          value: $(params.aroLocation)
        - name: aroClusterName
          value: $(params.aroClusterName)
        - name: aroVersion
          value: $(params.aroVersion)
        - name: azureSecretName
          value: $(params.azureSecretName)
        - name: pullSecretName
          value: $(params.pullSecretName)
        - name: postgresAdminPasswordSecretName
          value: $(params.postgresAdminPasswordSecretName)
        - name: deployPostgres
          value: $(params.deployPostgres)
        - name: deployRedis
          value: $(params.deployRedis)
        - name: deployQuay
          value: $(params.deployQuay)
      workspaces:
        - name: source
          workspace: source

    - name: validate-and-get-access
      runAfter: [deploy-aro]
      taskRef: { name: aro-validate-and-get-access }
      params:
        - name: aroClusterName
          value: $(params.aroClusterName)
        - name: azureSecretName
          value: $(params.azureSecretName)
        - name: postgresAdminPasswordSecretName
          value: $(params.postgresAdminPasswordSecretName)
        - name: hubKubeconfigSecretName
          value: $(params.hubClusterName)-kubeconfig
      workspaces:
        - name: source
          workspace: source

    - name: deploy-quay
      runAfter: [validate-and-get-access]
      when:
        - input: $(params.deployQuay)
          operator: in
          values: ["true"]
      taskRef: { name: aro-quay-deploy }
      params:
        - name: aroClusterName
          value: $(params.aroClusterName)
        - name: azureSecretName
          value: $(params.azureSecretName)
        - name: quayAdminPasswordSecretName
          value: $(params.quayAdminPasswordSecretName)
        - name: hubKubeconfigSecretName
          value: $(params.hubClusterName)-kubeconfig
      workspaces:
        - name: source
          workspace: source

    # =============================================
    # OSSM3 Restricted-Access Setup
    # =============================================

    # Pre-flight validation (runs in parallel with fetch-repository)
    - name: preflight-check
      taskRef: { name: ossm3-preflight-check }
      params:
        - name: obcName
          value: $(params.obcName)
        - name: pullSecretName
          value: $(params.pullSecretName)

    # Install Service Mesh 3.x operator on target cluster
    - name: verify-operators
      runAfter: [validate-and-get-access]
      taskRef: { name: ossm3-verify-operators }
      params:
        - name: hostedClusterName
          value: $(params.aroClusterName)
        - name: ossm3Channel
          value: $(params.ossm3Channel)
        - name: useWorkspaceKubeconfig
          value: "true"
      workspaces:
        - name: source
          workspace: source

    # Download and apply RBAC permissions from S3 (restricted-access resources)
    - name: apply-rbac
      runAfter: [verify-operators]
      taskRef: { name: ossm3-download-and-apply-rbac }
      params:
        - name: hostedClusterName
          value: $(params.aroClusterName)
        - name: obcName
          value: $(params.obcName)
        - name: s3Prefix
          value: $(params.s3Prefix)
        - name: useWorkspaceKubeconfig
          value: "true"
      workspaces:
        - name: source
          workspace: source

    # Prepare namespaces with labels and SCC annotations
    - name: prepare-namespaces
      runAfter: [apply-rbac]
      taskRef: { name: ossm3-prepare-namespaces }
      params:
        - name: hostedClusterName
          value: $(params.aroClusterName)
        - name: useWorkspaceKubeconfig
          value: "true"
      workspaces:
        - name: source
          workspace: source

    # Configure OpenShift Service Mesh 3.x
    - name: configure-mesh
      runAfter: [prepare-namespaces]
      taskRef: { name: ossm3-configure-mesh }
      params:
        - name: hostedClusterName
          value: $(params.aroClusterName)
        - name: useWorkspaceKubeconfig
          value: "true"
      workspaces:
        - name: source
          workspace: source

    # Generate SA-based restricted kubeconfig for ELM registration
    - name: generate-sa-based-kubeconfig
      runAfter: [configure-mesh]
      taskRef: { name: ossm3-generate-sa-based-kubeconfig }
      params:
        - name: hostedClusterName
          value: $(params.aroClusterName)
        - name: useWorkspaceKubeconfig
          value: "true"
      workspaces:
        - name: source
          workspace: source

    # Manual approval gate after OSSM3 setup and Quay deployment
    - name: approval-elm-eic-iflow-deployed
      runAfter: [deploy-quay, generate-sa-based-kubeconfig]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef:
        apiVersion: openshift-pipelines.org/v1alpha1
        kind: ApprovalTask
      params:
        - name: approvers
          value:
            - mjiao
            - rbhandar
            - ksatarin
            - kubeadmin
            - kube:admin
            - system:admin
        - name: description
          value: |
            ARO cluster, Azure services (PostgreSQL/Redis), Quay registry, and OSSM3 restricted-access setup are complete.

            Restricted kubeconfig stored as Secret 'edgelm-kubeconfig-generated-$(params.aroClusterName)'.

            🔧 Please complete the following manually:
            1. Register the cluster in ELM (use restricted kubeconfig, check "Restricted Access")
            2. Deploy Edge Integration Cell (EIC)
            3. Deploy iFlows for testing

            After deployment is complete and istio-ingressgateway has a LoadBalancer IP:
            ✅ APPROVE: Continue to create ConfigMap and run endpoint tests
            ❌ REJECT: Skip tests and proceed to teardown
        - name: numberOfApprovalsRequired
          value: '1'
        - name: timeout
          value: '336h'

    # Create ConfigMap with istio-ingressgateway LoadBalancer IP (after ELM/EIC/iFlow deployment)
    - name: validate-and-create-configmap
      runAfter: [approval-elm-eic-iflow-deployed]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef: { name: aro-validate-and-create-configmap }
      params:
        - name: aroClusterName
          value: $(params.aroClusterName)
        - name: azureSecretName
          value: $(params.azureSecretName)
      workspaces:
        - name: source
          workspace: source

    # Endpoint tests run after ConfigMap creation
    # NOTE: httpbinipfilter has an IP filter policy. The cluster pod CIDR
    # must be whitelisted in the iFlow's IP filter settings.
    - name: test-httpbinipfilter
      runAfter: [validate-and-create-configmap]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
        - input: $(params.skipAutomatedTests)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /httpbinipfilter
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-http-test1
      runAfter: [validate-and-create-configmap]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /http/test1
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-http-testelster
      runAfter: [validate-and-create-configmap]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /http/testelster
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-slvredis
      runAfter: [validate-and-create-configmap]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
        - input: $(params.skipAutomatedTests)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /slvredis
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-ratelimit-slvredis
      runAfter: [test-slvredis]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
        - input: $(params.skipAutomatedTests)
          operator: in
          values: ["false"]
      taskRef: { name: rate-limit-test }
      params:
        - name: endpointPath
          value: /slvredis
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    # Manual approval before second round of tests
    - name: approval-second-test-round
      runAfter:
        - test-httpbinipfilter
        - test-http-test1
        - test-http-testelster
        - test-slvredis
        - test-ratelimit-slvredis
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef:
        apiVersion: openshift-pipelines.org/v1alpha1
        kind: ApprovalTask
      params:
        - name: approvers
          value:
            - mjiao
            - rbhandar
            - ksatarin
            - kubeadmin
            - kube:admin
            - system:admin
        - name: description
          value: |
            First round of endpoint tests completed successfully.

            Cluster: $(params.aroClusterName)

            ✅ APPROVE: Run second round of endpoint tests
            ❌ REJECT: Skip second round and proceed
        - name: numberOfApprovalsRequired
          value: '1'
        - name: timeout
          value: '336h'

    # Second round of endpoint tests
    - name: test-httpbinipfilter-round2
      runAfter: [approval-second-test-round]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
        - input: $(params.skipAutomatedTests)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /httpbinipfilter
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-http-test1-round2
      runAfter: [approval-second-test-round]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /http/test1
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-http-testelster-round2
      runAfter: [approval-second-test-round]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /http/testelster
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-slvredis-round2
      runAfter: [approval-second-test-round]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
        - input: $(params.skipAutomatedTests)
          operator: in
          values: ["false"]
      taskRef: { name: endpoint-tests }
      params:
        - name: endpointPath
          value: /slvredis
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: test-ratelimit-slvredis-round2
      runAfter: [test-slvredis-round2]
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
        - input: $(params.skipAutomatedTests)
          operator: in
          values: ["false"]
      taskRef: { name: rate-limit-test }
      params:
        - name: endpointPath
          value: /slvredis
        - name: clusterConfigMapName
          value: "cluster-info-aro-$(params.aroClusterName)"
        - name: eicAuthSecretName
          value: $(params.eicAuthSecretName)
        - name: publicDNS
          value: $(params.publicDNS)
      workspaces:
        - name: source
          workspace: source

    - name: update-jira-ticket
      runAfter:
        - test-httpbinipfilter-round2
        - test-http-test1-round2
        - test-http-testelster-round2
        - test-slvredis-round2
        - test-ratelimit-slvredis-round2
      when:
        - input: $(params.skipEicValidation)
          operator: in
          values: ["false"]
      taskRef:
        name: jira-add-comment-custom
      params:
        - name: jiraSecretName
          value: $(params.jiraSecretName)
        - name: jiraIssueKey
          value: $(params.jiraIssueKey)
        - name: comment
          value: |
            h2. ✅ Complete EIC Validation Pipeline Completed

            ARO cluster with full EIC infrastructure and all automated endpoint tests completed successfully.

            *Infrastructure Configuration:*
            * *Cluster Name:* $(params.aroClusterName)
            * *Location:* $(params.aroLocation)
            * *ARO Version:* $(params.aroVersion)
            * *PostgreSQL:* $(params.deployPostgres) (VNet integrated, Bicep-managed)
            * *Redis:* $(params.deployRedis) (Private endpoint, Bicep-managed)
            * *Quay Storage:* $(params.deployQuay) (Azure Storage, Bicep-managed)
            * *Quay Registry:* ✅ Deployed

            *Pipeline Status:*
            * Repository cloned: ✅
            * ARO deployment with Azure services: ✅ Completed
            * Quay registry deployment: ✅ Completed
            * Validation and access setup: ✅ Completed
            * Endpoint tests (2 rounds): ✅ All Passed

            *Pipeline Details:*
            * *Repository:* $(params.repoUrl)
            * *Pull Request:* $(params.repoUrl)/pull/$(params.pullRequestNumber)
            * *Revision:* $(params.revision)
            * *Public DNS:* $(params.publicDNS)

            *Executed Tests (Round 1):*
            * test-httpbinipfilter ✅
            * test-http-test1 ✅
            * test-http-testelster ✅
            * test-slvredis ✅
            * test-ratelimit-slvredis ✅

            *Executed Tests (Round 2):*
            * test-httpbinipfilter-round2 ✅
            * test-http-test1-round2 ✅
            * test-http-testelster-round2 ✅
            * test-slvredis-round2 ✅
            * test-ratelimit-slvredis-round2 ✅

            *Infrastructure Components:*
            * ARO OpenShift cluster ✅
            * Azure PostgreSQL (VNet integrated) ✅
            * Azure Redis (Private endpoint) ✅
            * Quay container registry ✅
            * All EIC endpoints validated ✅

            *Security:*
            * PostgreSQL: Private connectivity via delegated subnet (Bicep-managed)
            * Redis: Private endpoint with private DNS (Bicep-managed)
            * Quay Storage: Azure Storage Account with private access (Bicep-managed)
            * Quay: Certificate trust configured for OpenShift integration

            Ready for manual teardown approval. The complete EIC infrastructure will be destroyed once approved.

    # Manual approval step before teardown - this will pause the pipeline
    - name: approval-teardown
      runAfter:
        - update-jira-ticket
      taskRef:
        apiVersion: openshift-pipelines.org/v1alpha1
        kind: ApprovalTask
      params:
        - name: approvers
          value:
            - mjiao
            - rbhandar
            - ksatarin
            - kubeadmin
            - kube:admin
            - system:admin
        - name: description
          value: |
            All endpoint tests completed. Please review results.
            
            ✅ APPROVE: Tear down ARO cluster and Azure resources
            ❌ REJECT: Keep cluster running (will timeout after 336h and teardown anyway)
        - name: numberOfApprovalsRequired
          value: '1'
        - name: timeout
          value: '336h'

    # Teardown after approval
    - name: teardown-aro
      runAfter: [approval-teardown]
      taskRef: { name: aro-teardown }
      params:
        - name: aroClusterName
          value: $(params.aroClusterName)
        - name: azureSecretName
          value: $(params.azureSecretName)
        - name: hubKubeconfigSecretName
          value: $(params.hubClusterName)-kubeconfig
      workspaces:
        - name: source
          workspace: source
