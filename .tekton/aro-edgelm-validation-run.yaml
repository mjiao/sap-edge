---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: aro-edgelm-validation-pr{{ pull_request_number }}-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"   # only PRs
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/task: "[./.tekton/tasks/git-clone.yaml]"
    pipelinesascode.tekton.dev/max-keep-runs: "1"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
spec:
  pipelineRef:
    name: aro-edgelm-validation-pipeline
  timeouts:
    pipeline: "336h"      # Total pipeline timeout (14 days)
    tasks: "335h"         # Individual task timeout (tasks + finally must be <= pipeline)
    finally: "60m"        # Finally tasks timeout
  params:
    - name: repoUrl
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: pullRequestNumber
      value: "{{ pull_request_number }}"
    - name: aroLocation
      value: "northeurope"
    - name: aroClusterName
      value: "sap-elm-pr{{ pull_request_number }}"
    - name: aroVersion
      value: "4.20.15"
    - name: azureSecretName
      value: "mj-azure-sp"
    - name: pullSecretName
      value: "mj-pull-secret"
    - name: quayAdminPasswordSecretName
      value: "quay-admin-secret"
    - name: jiraSecretName
      value: "jira-secret-rb"
    - name: jiraIssueKey
      value: "SAPOCP-1976"
    - name: targetVersionPrefix
      value: "4.22"                # major.minor only — used as default channel (stable-X.Y)
    - name: upgradeChannel
      value: "fast-4.22"           # override when stable-X.Y isn't available yet
    - name: hubKubeconfigSecretName
      value: "mgmt-kubeconfig"
    - name: skipEdgelmValidation
      value: "false"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteMany]
          storageClassName: ocs-storagecluster-cephfs
          resources:
            requests:
              storage: 2Gi
